<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayet E-Commerce</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold text-white" href="#">Sweet Balls</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link active text-white" href="#products">Products</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#order">Order</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<section id="products" class="py-5">
  <div class="container">
    <h2 class="text-center">Our Products</h2>
    <div class="row justify-content-center g-4">
      <div class="col-md-4">
        <div class="card text-center">
          <img src="images/munchkin.jpg" class="card-img-top img-fluid" alt="Graham Balls">
          <div class="card-body">
            <h5 class="card-title">Graham Balls</h5>
            <p class="card-text">P60 (9pcs)</p>
            <button class="btn btn-warning">Buy Now</button>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center">
          <img src="images/pastillas.jpg" class="card-img-top img-fluid" alt="Pastillas">
          <div class="card-body">
            <h5 class="card-title">Pastillas</h5>
            <p class="card-text">P50 (30pcs)</p>
            <button class="btn btn-warning">Buy Now</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="order" class="py-5">
  <div class="container">
    <h2 class="text-center">Place Your Order</h2>
    <form class="row g-3 justify-content-center">
      <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Your Name" required>
      </div>
      <div class="col-md-6">
        <input type="email" class="form-control" placeholder="Your Email" required>
      </div>
      <div class="col-md-6">
        <select class="form-select" required>
          <option value="">Choose Product...</option>
          <option value="graham balls">Graham Balls</option>
          <option value="pastillas">Pastillas</option>
        </select>
      </div>
      <div class="col-md-6">
        <input type="number" class="form-control" placeholder="Quantity" min="1" value="1" required>
      </div>
      <div class="col-12 text-center">
        <button type="submit" class="btn btn-warning">Submit Order</button>
      </div>
    </form>
  </div>
</section>

<footer id="contact" class="text-white text-center py-2 bg-dark">
  <p>Follow us on:</p>
  <a href="#" class="text-warning">Instagram</a> |
  <a href="#" class="text-warning">Facebook</a>
  <p class="mt-2">Email: sweetballs@gmail.com</p>
  <p class="mt-2">&copy; 2026 Sweet Balls. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
